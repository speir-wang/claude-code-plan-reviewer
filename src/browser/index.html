<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Code Plan Reviewer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app-layout">
      <nav id="sidebar" class="sidebar" data-sidebar></nav>
      <div id="main-area">
        <section id="conversation" class="conversation" data-conversation></section>
        <div id="workspace">
          <main id="plan-container" class="plan">
            <p class="plan__status">Loading…</p>
          </main>
          <aside id="comments-panel" class="comments-panel"></aside>
        </div>
        <footer id="feedback-controls" class="feedback-controls"></footer>
      </div>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
